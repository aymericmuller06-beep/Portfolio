<!doctype html>
<html lang="fr" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/src/Img/favicon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Portfolio | Aymeric Muller</title>
  </head>

  <body>

    <!-- Page loader (inline styles !!) -->
    <div id="page-loader" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#8eb69b;transition:opacity .45s ease,visibility .45s ease">
      <div style="width:42px;height:42px;border-radius:50%;border:3px solid rgba(0,0,0,.12);border-top-color:rgba(35,83,71,.85);animation:_lspin .7s linear infinite"></div>
    </div>
    <style>@keyframes _lspin{to{transform:rotate(360deg)}}</style>
    <script src="/src/scripts/page-loader.js"></script>

    <!-- Header -->
    <header class="topbar d-flex justify-content-between align-items-center px-3 py-3">
      <span class="topbar-name fw-bold text-uppercase">MULLER AYMERIC</span>
      <div class="d-flex align-items-center gap-3">
        <a href="/" class="btn-home btn btn-sm btn-outline-secondary btn-unified" aria-label="Accueil"><i class="fa-solid fa-house"></i></a>
        <button class="theme-toggle btn btn-sm btn-outline-secondary btn-unified" id="themeToggle" aria-label="Changer le thème"><i class="fa-solid fa-sun"></i></button>
        <span class="topbar-label fw-light text-uppercase opacity-75 ms-2 ms-sm-4">2025-2027</span>
      </div>
    </header>

    <div id="swup" class="transition-fade">

      <main>

        <section class="title-banner title-banner--compact position-relative overflow-hidden d-flex flex-column align-items-center justify-content-center text-center">
          <div id="particles-js" aria-hidden="true"></div>

          <div class="d-flex flex-column align-items-start">
            <h1 class="banner-title">REALISATIONS</h1>
          </div>

          <nav class="d-flex align-items-center gap-2 gap-sm-3 flex-wrap justify-content-center mt-4" aria-label="Actions réalisations">
            <a href="#realisations" class="btn btn-sm btn-outline-secondary btn-unified">Voir les réalisations</a>
            <span class="opacity-25 text-body" aria-hidden="true">·</span>
            <a href="/" class="btn btn-sm btn-outline-secondary btn-unified">Retour accueil</a>
          </nav>

          <div class="hero-bottom-fade" aria-hidden="true"></div>
        </section>

        <section id="realisations" class="py-5 px-3 px-sm-4 bg-body-secondary bg-opacity-25" data-aos="fade-up">
          <div class="container-lg">
            <h2 class="display-6 fw-black text-uppercase text-accent ls-tight mb-3">Mes réalisations</h2>
            <p class="mb-0 opacity-75">Projets concrets et réalisations professionnelles.</p>
          </div>
        </section>

      </main>

      <footer class="py-4 border-top">
        <div class="container d-flex justify-content-between flex-wrap gap-2">
          <span>© 2026 Aymeric Muller</span>
          <div class="d-flex flex-wrap gap-3">
            <a href="mailto:contact@example.com" class="nav-link p-0"><i class="fa-solid fa-envelope"></i>&nbsp; contact@example.com</a>
            <a href="https://github.com/aymericmuller06-beep" class="nav-link p-0" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-github"></i>&nbsp; GitHub</a>
          </div>
        </div>
      </footer>

    </div>

    <button id="backToTop" class="btn btn-sm btn-outline-secondary btn-unified" aria-label="Retour en haut"><i class="fa-solid fa-arrow-up"></i></button>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
