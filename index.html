<!doctype html>
<html lang="fr" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Aymeric Muller</title>
    <link rel="icon" type="image/png" href="/src/Img/favicon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      /* Loader styles inline pour être appliqué immédiatement */
      body {
        margin: 0;
        padding: 0;
      }
      
      #pageLoader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        background-color: #0f0f0f;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
      
      html[data-bs-theme="light"] #pageLoader {
        background-color: #f8f8f8;
      }
      
      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #333333;
        border-top-color: #52b788;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      html[data-bs-theme="light"] .loader-spinner {
        border-color: #dddddd;
        border-top-color: #2d6a4f;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      
      #backToTop {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div id="pageLoader" class="page-loader">
      <div class="loader-spinner"></div>
    </div>
    <div id="root"></div>
    <button id="backToTop" aria-label="Retour en haut de la page">
      <i class="fa-solid fa-arrow-up"></i>
    </button>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
